name: Validate Control Catalog

on:
  pull_request:
    paths:
      - "controls/aaef-controls-v0.1.csv"
      - "tools/validate_control_catalog.py"
      - ".github/workflows/validate-control-catalog.yml"
  push:
    paths:
      - "controls/aaef-controls-v0.1.csv"
      - "tools/validate_control_catalog.py"
      - ".github/workflows/validate-control-catalog.yml"

jobs:
  validate-control-catalog:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Validate AAEF control catalog
        run: python tools/validate_control_catalog.py
