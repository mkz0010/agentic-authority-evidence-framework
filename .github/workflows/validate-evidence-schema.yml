name: Validate Evidence Schema

on:
  pull_request:
    paths:
      - "schemas/**/*.json"
      - "examples/agentic-action-evidence-event*.json"
      - "tools/validate_evidence_schema.py"
      - ".github/workflows/validate-evidence-schema.yml"
  push:
    branches:
      - main
    paths:
      - "schemas/**/*.json"
      - "examples/agentic-action-evidence-event*.json"
      - "tools/validate_evidence_schema.py"
      - ".github/workflows/validate-evidence-schema.yml"

jobs:
  validate-evidence-schema:
    name: Validate evidence schema and examples
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install validation dependencies
        run: python -m pip install --upgrade pip jsonschema

      - name: Validate evidence schema and examples
        run: python tools/validate_evidence_schema.py
