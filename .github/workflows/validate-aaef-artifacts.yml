name: Validate AAEF Artifacts

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate-aaef-artifacts:
    name: Validate AAEF artifacts
    timeout-minutes: 10
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install validation dependencies
        run: python -m pip install --upgrade pip jsonschema

      - name: Validate assessment profile mapping
        run: python tools/validate_assessment_profiles.py

      - name: Validate assessment worksheet
        run: python tools/validate_assessment_worksheet.py

      - name: Validate control catalog
        run: python tools/validate_control_catalog.py

      - name: Validate testing procedures
        run: python tools/validate_testing_procedures.py

      - name: Validate external mappings
        run: python tools/validate_external_mappings.py

      - name: Validate evidence schema and examples
        run: python tools/validate_evidence_schema.py
